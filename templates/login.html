<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | The New College Assessment Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        :root {
            --maroon: #7a0b0b;
            --maroon-dark: #5b0707;
            --maroon-light: #9b1515;
            --gold: #d7b15c;
            --ink: #101828;
            --muted: #667085;
            --surface: #ffffff;
            --bg: #f9f4ec;
            --border: rgba(122, 11, 11, .13);
            --input-border: #e0d5c5;
            --radius-sm: 8px;
            --radius-lg: 22px;
            --shadow-lg: 0 20px 60px rgba(16, 24, 40, .13);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "DM Sans", system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--ink);
            padding: 2rem;
        }

        .login-box {
            background: var(--surface);
            padding: 3.5rem 3rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 440px;
            animation: fadeSlideUp .6s ease both;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header { text-align: center; margin-bottom: 2.2rem; }

        .login-header h1 {
            font-family: "Playfair Display", serif;
            font-size: 1.85rem;
            font-weight: 700;
            color: var(--maroon-dark);
            margin-bottom: .35rem;
        }

        .login-header p { font-size: .9rem; color: var(--muted); }

        .form-group { margin-bottom: 1.2rem; }

        .form-label {
            display: block;
            font-size: .82rem;
            font-weight: 600;
            margin-bottom: .45rem;
        }

        .input-wrap { position: relative; }

        .input-wrap > i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: .88rem;
            pointer-events: none;
        }

        .input-wrap input {
            width: 100%;
            padding: .82rem 1rem .82rem 2.7rem;
            border: 1.5px solid var(--input-border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: .93rem;
            outline: none;
        }

        .input-wrap input:focus {
            border-color: var(--maroon);
            box-shadow: 0 0 0 3px rgba(122, 11, 11, .1);
        }

        .form-error {
            background: #fff1f1;
            border: 1px solid #fca5a5;
            color: #b91c1c;
            border-radius: var(--radius-sm);
            padding: .7rem 1rem;
            font-size: .84rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .form-error.hidden { display: none; }

        .btn-login {
            width: 100%;
            padding: .9rem;
            background: linear-gradient(135deg, var(--maroon-dark), var(--maroon-light));
            color: #fff;
            font-family: inherit;
            font-size: .98rem;
            font-weight: 700;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .6rem;
            box-shadow: 0 4px 18px rgba(122, 11, 11, .3);
        }

        .home-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: .87rem;
        }

        .home-link a {
            color: var(--maroon);
            font-weight: 600;
            text-decoration: none;
        }

        .hint-box {
            margin-top: 1.5rem;
            padding: .9rem 1rem;
            background: #fff7e6;
            border: 1px solid #e0d5c5;
            border-radius: var(--radius-sm);
            font-size: .82rem;
            color: var(--muted);
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="{{ url_for('static', filename='image.png') }}" alt="Logo" style="width: 60px; height: 60px; object-fit: contain; margin-bottom: 1rem;">
        </div>

        <div class="login-header">
            <h1>Student Login</h1>
            <p>Use your Register Number and Date of Birth from CIA Data</p>
        </div>

        {% if error %}
        <div class="form-error">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" id="loginForm">
            <div class="form-group">
                <label class="form-label" for="register_number">Register Number</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-id-card"></i>
                    <input type="text" id="register_number" name="register_number" placeholder="e.g. 2413171019002" maxlength="13" required />
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="dob">Date of Birth</label>
                <div class="input-wrap">
                    <i class="fa-regular fa-calendar"></i>
                    <input type="date" id="dob" name="dob" required />
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
            </button>
        </form>

        <div class="hint-box">
            <i class="fa-solid fa-circle-info"></i>
            Credentials are verified against the college student database. Use your register number and date of birth on record.
        </div>

        <div class="home-link">
            <a href="/"><i class="fa-solid fa-house"></i> Back to Home</a>
        </div>
    </div>
</body>
</html>
